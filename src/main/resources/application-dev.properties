# =====================================
# DEV profile — H2 in-memory database
# =====================================

# H2 datasource
spring.datasource.url=jdbc:h2:mem:contentdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run schema.sql and data.sql on startup
spring.sql.init.mode=always

# Show SQL in console (useful while learning)
spring.datasource.hikari.connection-init-sql=
logging.level.org.springframework.jdbc=DEBUG

# CORS — local Vite dev server origins
cors.allowed-origins=http://localhost:5173,http://localhost:4173

# =====================================
# Actuator — expose all endpoints in dev
# =====================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
