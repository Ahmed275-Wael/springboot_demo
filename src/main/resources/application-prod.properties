# =========================================
# PROD profile — PostgreSQL (e.g. Railway)
# =========================================

# Railway injects DATABASE_URL automatically
# Format: postgresql://user:password@host:port/dbname
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Do NOT run schema.sql/data.sql in prod — manage schema with migrations
spring.sql.init.mode=never

# Server port — Railway injects PORT env var
server.port=${PORT:8080}

# CORS — set CORS_ALLOWED_ORIGINS env var on Railway to your frontend URL
# e.g. https://my-frontend.up.railway.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =====================================
# Actuator — only health in prod (security)
# =====================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
