# =========================================
# PROD profile — PostgreSQL (e.g. Railway)
# =========================================

# Set these in Railway Variables:
# DATABASE_URL=jdbc:postgresql://host:port/dbname
# DATABASE_USERNAME=postgres
# DATABASE_PASSWORD=yourpassword
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Do NOT run schema.sql/data.sql in prod — manage schema with migrations
spring.sql.init.mode=never

# Server port — Railway injects PORT env var
server.port=${PORT:8080}

# CORS — set CORS_ALLOWED_ORIGINS env var on Railway to your frontend URL
# e.g. https://my-frontend.up.railway.app
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =====================================
# Actuator — only health in prod (security)
# =====================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
